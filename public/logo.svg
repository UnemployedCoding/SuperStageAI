<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Globe -->
  <circle cx="50" cy="50" r="44" stroke="#FF6500" stroke-width="5" fill="none"/>
  <!-- Horizontal lines -->
  <ellipse cx="50" cy="50" rx="44" ry="16" stroke="#FF6500" stroke-width="4" fill="none"/>
  <!-- Vertical arc -->
  <ellipse cx="50" cy="50" rx="16" ry="44" stroke="#FF6500" stroke-width="4" fill="none"/>
  <!-- House roof -->
  <polygon points="50,28 22,52 78,52" stroke="#FF6500" stroke-width="5" fill="white" stroke-linejoin="round"/>
  <!-- House body -->
  <rect x="30" y="52" width="40" height="24" fill="white" stroke="#FF6500" stroke-width="5" stroke-linejoin="round"/>
  <!-- Window -->
  <rect x="41" y="56" width="18" height="14" stroke="#FF6500" stroke-width="4" fill="none" rx="1"/>
  <line x1="50" y1="56" x2="50" y2="70" stroke="#FF6500" stroke-width="3"/>
  <line x1="41" y1="63" x2="59" y2="63" stroke="#FF6500" stroke-width="3"/>
</svg>
